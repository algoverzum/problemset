  Az `N` értékének beolvasása után írj egy for ciklust, amiben beolvasod az egyes szobák oldalhosszát. Milyen művelettel kapod meg a négyzetét? Emlékeztető: nem működik a `^` operátor a hatványozásra.
- Ha `a` az oldal hossza, akkor a négyzetét az `a * a` művelettel lehet megkapni.
- Legyen egy külön változó az eredmény tárolására (`sum`), kezdetben legyen 0.
- A beolvasott oldalhossz négyzetével növeljük mindig az eredmény változót (`sum += a * a`)
