  After reading `N`, write a for loop in which you read each of the side lengths. How can you get the square of a number? Reminder: the `^` operator for exponentiation does not work.
- If `a` is the length of the side, then its square can be obtained by `a * a`.
- Let's have a separate variable that stores the result (e.g. `sum`)
- After reading the side length, increase the result variable with its square (`sum += a * a`).
