- A számsorozat páratlan elemeinek összegét kell kiszámolnunk. Először olvassuk be az elemek számát (N), majd egy N-szer ismétlődő for ciklusban az elemeket egyesével.
- Legyen egy külön változónk, ami az eredményt számolja, ne felejtsük el kezdetben 0-ra állítani.
- Minden szám beolvasása után egy `if` utasítással ellenőrizzük, hogy páratlan-e (`x % 2 == 1`), és ha igen, akkor adjuk hozzá az eredmény változóhoz.
