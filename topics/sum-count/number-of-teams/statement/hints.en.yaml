- Count how many ages are at least 18 and at most 21. Then divide the count of eligible ages by 3 to determine how many full teams can be formed.
- cpp: |
      To check if an age meets the conditions, we can use:
      if (age >= 18 && age < 21)
- py: |
      To check if an age meets the conditions, we can use:
      if age >= 18 and age < 21:
- cpp: When dividing, the `/` operator rounds down, which is exactly what we need to determine the number of teams.
  py: When dividing, use the `//` operator to ensure rounding down when calculating the number of teams.
