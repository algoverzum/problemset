- Egy 10-es `for` cikluson bellül olvassuk be a számokat.
- Hozzunk létre egy kezdetben nulla értékű változót az összeg tárolásához, és minden szám beolvasása után adjuk hozzá a beolvasott számot. A ciklus után már csak ki kell írni az eredményt.
- cpp: |
    Ezt megtehetjük így:
    	`int sum = 0;
       	int n;
       	for (int i = 0; i < 10; i++) {
          cin >> n;
          sum += n;
       	}`
  py: |
    Ezt megtehetjük így:
    	`sum=0
	for i in range(10):
	    sum += int(input())`