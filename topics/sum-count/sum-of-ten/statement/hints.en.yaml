- Let's read the numbers inside a `for` loop of length 10.
-  Create a variable with an initial value of zero to store the sum, and after reading a new number, add this to the sum. After the cycle, you only have to print this sum.
- cpp: |
    We can do this like this:
    	`int sum = 0;
       	int n;
       	for (int i = 0; i < 10; i++) {
          cin >> n;
          sum += n;
       	}`
  py: |
    We can do this like this:
    	`sum=0
	for i in range(10):
	    sum += int(input())`
