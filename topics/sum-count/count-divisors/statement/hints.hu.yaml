- Számoljunk el 1-től n-ig egy for ciklussal.
- Hozzunk létre egy változót kezdeti értékként 0-val, és növeljük meg 1-gyel minden alkalommal, amikor találunk egy osztót. A ciklus után csak ki kell írnunk az eredményt.
- cpp: |
    Ezt így valósíthatjuk meg:
    ```
    int divisors = 0;
    for (int i = 1; i <= n; i++) {
      if (n % i == 0) {
        divisors++;
      }
    }
    ```
- py: |
    Ezt így valósíthatjuk meg:
    ```
    divisors = 0
    for i in range(1, n + 1):
        if n % i == 0:
            divisors = divisors + 1
    ```
