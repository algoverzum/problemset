- We can calculate from 1 to `N` with a `for` loop.
- Create a variable with an initial value of 1 to store the product, and within the cycle, always multiply the current product by the next number. After the cycle, you only have to print the product.
- cpp: |
    We can do this like this:
    		`int prod = 1;
       	for (int i = 1; i <= N; i++) {
          prod *= i;
       	}`
  py: |
    We can do this like this:
    	`prod = 1
	for i in range(1, N + 1):
	    prod *= i`
