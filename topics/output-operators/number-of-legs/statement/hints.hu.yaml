- cpp: A szorzás jele a programozásban `*` (a csillag karakter). A számítógép ugyanúgy számol, ahogy azt a matematika órán is tanulod, tehát a szorzás erősebb művelet, mint az összeadás. 
- cpp: 'Számítsuk ki először a lárkák lábainak számát (az állatok számának hétszerese), majd a vrukik összes lábát (háromszorosa a darabszámuknak) és ezeket adjuk össze. Emlékeztető: a `cout <<` parancs használatával írhatod ki az eredményt, és ne felejtsd el a `;` -t az utasítás végén.'
- cpp: cout << 7 * 13337 + 3 * 42424;
