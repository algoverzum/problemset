- cpp: The operator for division is `/` in C++. If the two operands are integer numbers, the result will be also an integer number, which means that the fractional part is discarded. (For this task it is very useful.) The remainder after a division can be calculated with the `%`, so-called *modulo* operator. For example `13 / 5 = 2` (not 2.6), and `13 % 5 = 3`, since `13 = 2 * 5 + 3`.
  py: There are two different division operators in Python. The regular division is `/` (e.g. `13 / 5 = 2.6`), while `//` denotes the integer division, where the fractional part is discarded (e.g. `13 // 5 = 2`) The remainder after a division can be calculated with the `%`, so-called *modulo* operator. For example, `13 % 5 = 3`, since `13 = 2 * 5 + 3`.
