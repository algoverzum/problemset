  A 6 óra alatt elvitt vízmennyiséget le kell vonnunk a kezdeti 1111 literből. Először próbálj meg felírni egy számítást arra, hogy egy óra alatt mennyi vizet hord el Nini és Goro.
- Nini egy óra alatt 4 * 12 liter vizet visz el, Goro pedig 9 * 7 litert.
- cpp: cout << 1111 - 6 * (4 * 12 + 9 * 7);
  py: print(1111 - 6 * (4 * 12 + 9 * 7))

