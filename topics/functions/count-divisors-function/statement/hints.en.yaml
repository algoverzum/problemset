---
- cpp: |
    The function header should be: `int count_divisors(int n) {`
  py: |
    The function header should be: `def count_divisors(n):`
- Inside the function, we need to perform a counting, so we should have a counter variable (`cnt`), initially set to 0. At the end, we return this value using the `return` statement.
- Iterate through numbers from `i = 1` to `n`, and if `n` is divisible by `i`, increment the counter (`cnt`).
- cpp: |
    The `if` statement inside the `for` loop can be written as: `if (n % i == 0) cnt++;`
  py: |
    The `if` statement inside the `for` loop can be written as: `if n % i == 0: cnt += 1`
