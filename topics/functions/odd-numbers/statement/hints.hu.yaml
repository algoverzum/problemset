- cpp: |
    A függvény fejléce így nézzen ki: `vector<int> odd_numbers(vector<int> szamok) {`
  py: |
    A függvény fejléce így nézzen ki: `def odd_numbers(szamok):`
- cpp: Az eredmény egy vector lesz, csináljunk tehát egy üres vectort az elején, legyen a neve paratlan.
  py: Az eredmény egy lista lesz, csináljunk tehát egy üres listát az elején, legyen a neve paratlan.
- cpp: Menjünk végig a bemeneti számokon, és ha az adott szám páratlan, akkor adjuk hozzá a paratlan vectorba.
  py: Menjünk végig a bemeneti lista elemein, és ha az adott elem páratlan, akkor tegyük bele a paratlan listába.
- cpp: Azt, hogy egy szám páratlan, a `szam % 2 == 1` feltétel segítségével tudjuk ellenőrizni. A vectorunkhoz hozzáfűzni egy elemet a `paratlan.push_back(szam);` paranccsal lehet.
  py: Azt, hogy egy szám páratlan, a `szam % 2 == 1` feltétel segítségével tudjuk ellenőrizni. Egy listához hozzáfűzni egy elemet a `paratlan.append(szam)` paranccsal lehet.
