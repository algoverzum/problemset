---
- Only the first and last letters of words count. For each transition, the last letter of the current word is the same as the first letter of the next word.
- 'Each letter must have the same number of first and last letters, except possibly two: the first letter of the first word and the last letter of the last word. However, this is not a sufficient condition. Consider, for example, these words: ab, ba, cd, dc.'
- Imagine a graph in which the vertices are the letters and each word is an edge that goes from the first letter to the last (directed). In this graph, we are looking for a walk that goes along all the edges (Euler-path). This also requires that the graph is connected - in the sense that the edges are considered undirected (this is called weakly connected).
- 'Connectivity, and the condition on the degree numbers (for all vertices, in degree = out degree, except for two vertices where there may be 1 difference between them) is obviously necessary. This is also sufficient, the proof is also interesting, here: https://en.wikipedia.org/wiki/Eulerian_path '
