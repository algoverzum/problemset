---
- Use the built-in `sort` function to sort the list of numbers. Print it, then reverse the sorted list and print it again.
- cpp: |
    Sort a vector v: `sort(v.begin(), v.end());`. Reverse: `reverse(v.begin(), v.end());`
  py: |
    Sort a list l: `l.sort()`. Reverse: `l.reverse()` or `l = l[::-1]`