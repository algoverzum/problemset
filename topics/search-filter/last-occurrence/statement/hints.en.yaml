---
- The last occurrence is the first one from the end.
- Define an index variable `i`, initially pointing to the last letter, and decrement it until the pointed letter matches the search key. Be careful not to let `i` drop below 0.
- cpp: |
        int i = s.size() - 1;
        while (i >= 0 && s[i] != key) i--;
  py: |
        i = len(s) - 1
        while i >= 0 and s[i] != key: i -= 1
