---
- cpp: Már akár beolvasás közben a fogadható jelek forrásait gyűjthetjük egy vectorba.
  py: Már akár beolvasás közben a fogadható jelek forrásait gyűjthetjük egy listába.
- cpp: Kezdetben vegyünk fel egy üres `vector<string>` -et, majd a `push_back()` függvényt használva tudjuk beletenni a jó jelek forrását.
  py: Kezdetben vegyünk fel egy üres listát (`[]`), majd az `append()` függvényt használva tudjuk beletenni a jó jelek forrását.
- Azt kell ismételnünk n-szer, hogy beolvassuk egy string változóba a forrást, egy int változóba a frekvenciát, és ha a frekvencia <= 500, akkor a forrást bevesszük a megoldások közé.
- cpp: |
        vector<string> received;
        for (int i = 0; i < N; i++) {
            string source;
            int frequency;
            cin >> source;
            cin >> frequency;
            if (frequency >= 500) {
                received.push_back(source);
            }
        }
  py: |
        received = []
        for i in range(n):
            source = input()
            frequency = int(input())
            if frequency >= 500:
                received.append(source)
