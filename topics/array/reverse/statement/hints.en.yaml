---
- cpp: |
    We have to store the numbers. In C++, we can use the `vector<int>` type to store many integers, a vector of size 13 can be created as follows: `vector<int> numbers(13);`. Its elements are indexed starting from 0, so you can refer to them like this: `numbers[0]`, `numbers[1]`, $\ldots$, `numbers[12]`. An element of the vector (e.g. `numbers[0]`) behaves exactly as a variable.
  py: |
    We have to store the numbers. In Python, lists can be used to store many elements. The elements of the list are indexed from 0, for example the elements of a 13-element `numbers` list can be referred to as: `numbers[0]`, `numbers[1]`, $\ldots$, `numbers[12]`. An element of the list (e.g. `numbers[0]`) behaves exactly as a variable.
- cpp: |
    It is worth using a for loop from $i=0$ to $i<13$ to read the elements. The instruction that reads the next value of the input into `numbers[i]` must be placed inside the loop: `cin >> numbers[i];`
  py: |
    It is possible to read a line and then create a list containing the numbers in the line with a rather complex command, we give it to you without a long explanation: `numbers = [int(x) for x in input().split()]`
- cpp: The elements of the vector can be printed in their original order in the same way with a for loop. We also recommend a for loop for printing in reverse order. Where should we start that loop and until which index shall we go?
  py: |
    We recommend a for loop to print the elements of the list. It is possible to change the print command such that instead of a line break, it only adds a space after the data: `print(numbers[i], end=" ")`. What should be the start and end of the range of the for loop in the original order, and in the reverse order?
- cpp: |
    For printing in reverse order, a loop like this is good: `for (int i = 12; i >= 0; i--) cout << numbers[i] << " ";`
  py: |
    The `for i in range(13):` loop goes from point 0 to 12, within which a `print(numbers[i], end=" ")` statement is good. To print in reverse order, you need `range(12, -1, -1)`.
