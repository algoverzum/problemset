- description: With a `for` loop we should go through the numbers from $i=20$ to 1, reducing \(i\) by 1 each time.
- cpp: |
    This can be done by `for (int i = 20; i > 0; i--) { ... }`
  py: |
    This can be done by `for i in range(20, 0, -1):`
- cpp: |
    Inside the `for` loop we need to print $i$: `cout << i << "\n";`
  py: |
    Inside the `for` loop we need to print $i$: `print(i)`
