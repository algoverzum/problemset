- description: Menjünk végig $i=20$-tól 1-ig a számokon `for` ciklussal és minden lépésben csökkentsük i-t 1-gyel!
- cpp: |
    Ezt megtehetjük így: `for (int i = 20; i > 0; i--) { ... }`
  py: |
    Ezt megtehetjük így: `for i in range(20, 0, -1):`
- cpp: |
    A `for` cikluson belül a kiírást megtehetjük így: `cout << i << "\n";`
  py: |
    A `for` cikluson belül a kiírást megtehetjük így: `print(i)`
