- Menjünk végig $i=10$-től 99-ig a számokon `for` ciklussal! A ciklus kezdetének és végének megadásához vajon mit kell másképp írni?
- cpp: |
    Így nézzen ki a ciklus fejléce: `for (int i = 10; i <= 99; i++) { ... }`
  py: |
    Így nézzen ki a ciklus fejléce (figyelj arra, hogy a range() második paramétere már nincs a tartományban): `for i in range(10, 100):`
- cpp: |
    A `for` cikluson belül az $i$ értékét és egy sortörést kell kiírni: `cout << i << "\n";`
  py: |
    A `for` cikluson belül az $i$ értékét kell kiírni: `print(i)`
