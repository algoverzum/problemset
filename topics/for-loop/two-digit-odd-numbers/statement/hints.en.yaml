- It would be great, if the `for` loop stepped on every second number. Then if we start from 11, we can get exactly the odd two-digit numbers. What do you think we need to change to make the loop step by 2 always?
- cpp: |
    Instead of `i++`, we can write `i += 2`: `for (int i = 11; i <= 99; i += 2 ) { ... }`
  py: |
    We can give a third parameter to the range() that is the step size: `for i in range(11, 100, 2):`
- cpp: |
    Inside the `for` loop we need to print $i$ and a line break: `cout << i << "\n";`
  py: |
    Inside the `for` loop we need to print $i$: `print(i)`