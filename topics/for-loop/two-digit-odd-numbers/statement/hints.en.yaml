- description: With a `for` loop we should go through the numbers from $i=11$ to 99. If we increment i by 2 each time, we will get all the odd numbers.
- cpp: |
    This can be done by `for (int i = 11; i < 100; i+=2) { ... }`
  py: |
    This can be done by `for i in range(11, 100, 2):`
- cpp: |
    Inside the `for` loop we need to print $i$: `cout << i << "\n";`
  py: |
    Inside the `for` loop we need to print $i$: `print(i)`
