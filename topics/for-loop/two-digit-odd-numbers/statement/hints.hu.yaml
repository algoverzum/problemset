- Most az lenne a legjobb nekünk, ha minden második számon menne végig a `for` ciklus. Ekkor 11-től kezdve pont megkapnánk a páratlan kétjegyű számokat. Vajon mit kell másképp írni, hogy kettesével lépkedjen a ciklus?
- cpp: |
    Az `i++` helyett tudunk írni `i += 2`-t: `for (int i = 11; i <= 99; i +=2 ) { ... }`
  py: |
    A range()-nek lehet adni egy harmadik paramétert, ami a lépésköz: `for i in range(11, 100, 2):`
- cpp: |
    A `for` cikluson belül az $i$ értékét és egy sortörést kell kiírni: `cout << i << "\n";`
  py: |
    A `for` cikluson belül az $i$ értékét kell kiírni: `print(i)`
