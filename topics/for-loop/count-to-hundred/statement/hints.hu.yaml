- Menjünk végig $i=1$-től 100-ig a számokon `for` ciklussal!
- cpp: Ezt megtehetjük így: `for (int i = 1; i <= 100; i++) { ... }`
  py: Ezt megtehetjük így: `for i in range(1, 101):`
- cpp: A `for` cikluson bellül a kiírást megtehetjük így: `cout << i << "\n";`
  py: A `for` cikluson bellül a kiírást megtehetjük így: `print(i)`