- Olvassuk be az $N$ értékét egy változóba. Egy `for` ciklussal menjünk végig $i=1$-től $N$-ig a számokon, és mindig írjuk ki az aktuális szám négyzetét.
- cpp: |
    A ciklus így nézhet ki: `for (int i = 1; i <= N; i++) { ... }` Ezen belül az $i$ változó négyzetét kell kiírni.
  py: |
    A ciklus így nézhet ki: `for i in range(1, N + 1):` Ezen belül az $i$ változó négyzetét kell kiírni.
- cpp: |
    A cikluson belül az $i$ négyzetét így lehet kiírni: `cout << i * i << "\n"`
  py: |
    A cikluson belül az $i$ négyzetét így lehet kiírni: `print(i * i)`