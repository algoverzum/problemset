- 'Mivel $n, m \le 100$ és a tesztesetek száma $t \le 100$, ezért belefér az időbe, hogy az összes esetet kipróbáljuk (legfeljebb $100 \cdot 100 \cdot 100$ = 1 millió eset).'
- 'Miután beolvastuk a bal zsebben és jobb zsebben lévő érméket, egy dupla for ciklussal menjünk rajtuk végig és számoljuk, hogy hány esetben igaz az, hogy $b[i] + c[j] \le k$.'
