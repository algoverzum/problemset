- We want to get the integer division and division with remainder of C and N
- cpp: You can get the integer of the quotient of C and N with the statement `C / N`. And you can get the division's remainder of C and N with the statement `C % N`.
  py: You can get the integer of the quotient of C and N with the statement `C // N`. And you can get the division's remainder of C and N with the statement `C % N`.
