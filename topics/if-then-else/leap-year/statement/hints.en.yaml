---
- Check if it is divisible by 4.
  If not, then it is definitely not a leap year.
- This is done by
  ```year % 4 != 0```
- If it is divisible by 4, then check if it is also divisible by 100.
  If not, then it is definitely a leap year.
- If it is divisible by 100, then it is only a leap year if it is also divisible by 400.
- Does it follow that if a number is divisible by both 4 and 100, then it is also divisible by 400?
- No! For example: 100 is divisible by both 4 and 100, but not by 400.
