- Az `N % 2` utasítással kaphatjuk meg az $N$ szám 2-vel való osztási maradékát. Ha `N % 2` értéke 0 akkor $N$ páros, ha `N % 2` értéke 1 akkor $N$ páratlan. Ezt kell ellenőrizni $A$-ra és $B$-re is.
- Használjunk `if` utasítást, és kezdjük azzal a vizsgálatot, hogy $A$ páratlan *és* $B$ is páratlan, akkor a válasz 2, *egyébként* ha $A$ páratlan *vagy* $B$ páratlan, akkor 1 a válasz, *egyébként* 0.
