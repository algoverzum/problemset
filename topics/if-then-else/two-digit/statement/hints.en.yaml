---
- A number is two-digit if it is at least 10 and at most 99.
- cpp: |
    The expressions `n >= 10` and `n <= 99` can be combined using the logical AND operator, which is written with `&&`:
        if (n >= 10 && n <= 99) ...
  py: |
    The expressions `n >= 10` and `n <= 99` can be combined using the logical AND operator, which is represented by the `and` keyword:
        if n >= 10 and n <= 99: ...
