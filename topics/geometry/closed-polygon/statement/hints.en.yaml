- Take the bottom left corner point the one with the smallest $x$ coordinate and among those the smallest $y$ coordinate. Starting from this point, consider the other points according to some ordering principle. What kind of ordering principle can you think of if we look at the other points from this corner point?
- Imagine a ray starting from the corner point that initially points downward, then we start rotating it to the right and upward, and we observe when each point is crossed by the ray. If we list the points in this order, that gives a good ordering principle. For the points that lie on the same line when viewed from the corner point, in what order should they appear?
- Points that lie on the same line should be listed in order of their distance from the corner point, except at the end if together with the last point there are several points on the same line, then they must be arranged in reverse order of distance. Apart from this final step, we can determine the order of the points with a single sorting operation using a sort function. On what basis do we compare two points?
- Let us denote the corner point by $Q$. Then between points $A$ and $B$, $A$ comes before $B$ in the order that is $A<B$ if fordul($Q,A,B$) is positive or fordul($Q,A,B$)=0 and tavnegyzet($Q,A$)$<$tavnegyzet($Q,B$). So we need a comparison function that also has access to the point $Q$. After sorting, do not forget to reverse the order of the last collinear points.
