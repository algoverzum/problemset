---
- Vegyük a bal alsó sarokpontot (a minimális $x$ koordinátájúak közül a minimális $y$ koordinátájút). Innen indulva valamilyen rendezési elv szerint vegyük a többi pontot. Milyen rendezési elvre tudsz gondolni, ha ebből a sarokpontból nézzük a többi pontot?
- Képzeljünk el egy félegyenest, ami a sarokpontból kezdetben lefelé mutat, aztán elkezdjük forgatni jobbra-felfelé, és nézzük, hogy mikor melyik pont kerül át rajta. Ha ebben a sorrendben soroljuk fel a pontokat, akkor az egy jó rendezőelv. Azok a pontok, amik a sarokpontból nézve egy egyenesen vannak, milyen sorrendben legyenek?
- Az egy egyenesen lévő pontokat a sarokponttól való távolság szerinti sorrendben soroljuk fel, kivéve a végén, ha az utolsó ponttal együtt több is van egy egyenesen, akkor a távolság szerinti fordított sorrendbe kell rakni őket. Ezt az utolsó lépést leszámítva egy rendezéssel (sort függvénnyel) meg tudjuk csinálni a pontok sorrendjét. Két pont összehasonlítását mi alapján csináljuk?
- Jelöljük a sarokpontot $Q$-val. Ekkor $A$ és $B$ pont közül a sorrendben A van előrébb ($A<B$), ha fordul($Q,A,B$) pozitív vagy fordul($Q,A,B$)=0 és tavnegyzet($Q,A$)$<$tavnegyzet($Q,B$). Tehát egy olyan összehasonlító függvény kell, ami a $Q$ pontot is eléri. A rendezés után ne felejtsd el az utolsó egyenesen lévő pontok sorrendjét megfordítani.
