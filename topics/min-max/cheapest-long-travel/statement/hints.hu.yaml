- cpp: Az utazások távolságait és árait tároljuk egy-egy vectorban. Miközben végigmegyünk rajtuk (indexet használva), jegyezzük meg, hogy mennyi volt az addigi legolcsóbb utazás legalább $K$ távolságra.
  py: Az utazások távolságait és árait tároljuk egy-egy listában. Miközben végigmegyünk rajtuk (indexet használva), jegyezzük meg, hogy mennyi volt az addigi legolcsóbb utazás legalább $K$ távolságra.
- Legyen egy `mini` változó, ami kezdetben -1. Egy for ciklusban vizsgáljuk az elemeket és ha az aktuális távolság legalább $K$, akkor frissítsük a `mini` értékét. Pontosan mi legyen a feltétel?
- Ha a `mini` értéke még -1, akkor mindenképp állítsuk át a mostani árra, egyébként pedig, ha a mostani ár kisebb, mint `mini` akkor is át kell állítanunk.
